<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOSTBERRIES</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Geist', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    background-image: url('https://images.pexels.com/photos/13055096/pexels-photo-13055096.jpeg');
    background-size: cover;
    background-position: center;
    position: relative;
  }
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
  }
  .content {
    position: relative;
    z-index: 1;
  }
  h1 {
    font-size: clamp(1.8rem, 7vw, 3.4rem);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 1.2rem;
  }
  a {
    font-size: 0.85rem;
    font-weight: 300;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    letter-spacing: 0.03em;
  }
  a:hover { color: #fff; }
</style>
</head>
<body>
  <div class="content">
    <h1>Boostberries</h1>
    <a href="mailto:besnik@boostberries.com">besnik@boostberries.com</a>
  </div>
</body>
</html>
